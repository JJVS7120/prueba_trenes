{% extends "base.html" %}

{% block content %}

<h2>Editar Usuario</h2>

<form method="POST">

    <div class="mb-3">
        <label>Username</label>
        <input
            type="text"
            name="username"
            value="{{ user.username }}"
            class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input
            type="email"
            name="email"
            value="{{ user.email }}"
            class="form-control">
    </div>

    <div class="mb-3">
        <label>Rol</label>

        <select name="role" class="form-select">

            <option value="user"
                {% if user.role=="user" %}selected{% endif %}>
                User
            </option>

            <option value="admin"
                {% if user.role=="admin" %}selected{% endif %}>
                Admin
            </option>

        </select>

    </div>

    <button class="btn btn-success">
        Guardar cambios
    </button>

</form>

{% endblock %}
