{% extends "base.html" %}

{% block content %}

<h2>➕ Crear Usuario</h2>

<form method="POST">

    <div class="mb-3">
        <label>Username</label>
        <input
            type="text"
            name="username"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input
            type="email"
            name="email"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input
            type="password"
            name="password"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label>Rol</label>

        <select name="role" class="form-select">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

    </div>

    <button class="btn btn-success">
        Crear usuario
    </button>

</form>

{% endblock %}
