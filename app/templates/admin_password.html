{% extends "base.html" %}

{% block content %}

<h2>

Contraseña de

{{ usuario.username }}

</h2>

<form method="POST">

    <div class="mb-3">

        <label>Nueva contraseña</label>

        <input
            type="text"
            name="password"
            class="form-control"
            required
        >

    </div>

    <button
        class="btn btn-danger"
        type="submit"
    >
        Guardar
    </button>

</form>

{% endblock %}
